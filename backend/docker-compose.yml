# ====================================
# Anonim Oylama - Docker Compose
# PostgreSQL veritabanı servisi
# ====================================
# Kullanım:
#   docker-compose up -d    → Servisleri başlat
#   docker-compose down     → Servisleri durdur
#   docker-compose down -v  → Servisleri ve verileri sil

services:
  postgres:
    image: postgres:16-alpine
    container_name: anonim_oylama_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anonim_oylama
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
